# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: n8n-exporter

before:
  hooks:
    - go mod tidy

builds:
  - id: n8n-exporter
    binary: n8n-exporter
    main: .
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: n8n-exporter
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: whoAngeel
    name: n8n-workflow-exported
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
